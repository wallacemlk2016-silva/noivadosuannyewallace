<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Wallace & Suanny</title>

<style>

body {
margin:0;
background:#efeae4;
font-family: 'Georgia', serif;
}

/* CONTAINER */
.container {
text-align:center;
}

/* CAPA */
.capa {
width:320px;
margin-top:40px;
cursor:pointer;
transition:0.5s;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.capa:hover {
transform: scale(1.05);
}

/* CONVITE IMAGEM */
.convite {
width:100%;
max-width:500px;
margin:auto;
display:none;
animation: fadeZoom 1.2s ease;
}

.convite img{
width:100%;
display:block;
}

/* ANIMAÇÃO */
@keyframes fadeZoom {
from{
opacity:0;
transform:scale(1.05);
}
to{
opacity:1;
transform:scale(1);
}
}

/* CAIXA BOTÕES */
.botoes {
display:none;
padding:20px;
margin:20px auto 40px auto;
width:90%;
max-width:340px;
text-align:center;

background: rgba(0,0,0,0.35);
backdrop-filter: blur(8px);
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);

animation: subir 1s ease;
}

@keyframes subir {
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

button {
margin:6px;
padding:12px 16px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:14px;
font-weight:bold;
transition:0.3s;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
width:100%;
}

button:hover{
transform:translateY(-2px);
}

.sim{
background:linear-gradient(45deg,#ff4da6,#ff80bf);
color:white;
}

.nao{
background:linear-gradient(45deg,#ff8c42,#ffb066);
color:white;
}

.talvez{
background:linear-gradient(45deg,#999,#bbb);
color:white;
}

.maps{
background:linear-gradient(45deg,#333,#555);
color:white;
}

.whats{
background:linear-gradient(45deg,#25D366,#4be083);
color:white;
}

.msg {
margin-top:10px;
font-size:14px;
color:white;
}

/* CORAÇÕES */
.heart {
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall {
to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div class="container">

<img src="imagem1.jpeg" class="capa" onclick="abrirConvite()">

<div class="convite" id="convite">
<img src="imagem2.png">
</div>

<div class="botoes" id="botoes">

<p><b style="color:white;">Você aceita celebrar conosco?</b></p>

<button class="sim" onclick="resposta('sim')">SIM 💖</button>
<button class="nao" onclick="resposta('nao')">NÃO 🧡</button>
<button class="talvez" onclick="resposta('talvez')">TALVEZ 🩶</button>

<br>

<button class="maps" onclick="abrirMapa()">📍 Ver Local</button>
<button class="whats" onclick="whats()">💬 Confirmar no WhatsApp</button>

<p class="msg" id="msg"></p>

</div>

</div>

<audio id="musica" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

let escolha = "";

function abrirConvite(){
document.querySelector(".capa").style.display="none";
document.getElementById("convite").style.display="block";
document.getElementById("botoes").style.display="block";
document.getElementById("musica").play().catch(()=>{});
coracoes();
}

function coracoes(){
for(let i=0;i<40;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(h);
}
}

function resposta(op){
let msg=document.getElementById("msg");
escolha = op;

if(op==="sim"){
msg.innerHTML="💖 Perfeito! Estamos muito felizes!";
}
if(op==="nao"){
msg.innerHTML="🧡 Vamos sentir sua falta!";
}
if(op==="talvez"){
msg.innerHTML="🩶 Esperamos te ver lá!";
}
}

function abrirMapa(){
window.open("https://www.google.com/maps/search/?api=1&query=Restaurante+Skillus+Classic+Recife");
}

function whats(){

if(escolha === ""){
alert("Escolha uma opção primeiro 😊");
return;
}

let texto = "";

if(escolha === "sim"){
texto = "Oi! Confirmo presença no noivado de Wallace & Suanny 💍💖";
}
if(escolha === "nao"){
texto = "Oi! Não poderei ir ao noivado de Wallace & Suanny 🧡";
}
if(escolha === "talvez"){
texto = "Oi! Talvez eu vá ao noivado de Wallace & Suanny 🩶";
}

window.open("https://wa.me/?text=" + encodeURIComponent(texto));
}

</script>

</body>
</html>
